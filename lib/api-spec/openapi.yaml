openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: My Friend Buyer API - inventory management
servers:
  - url: /api
tags:
  - name: health
  - name: me
  - name: companies
  - name: stores
  - name: warehouses
  - name: suppliers
  - name: skus
  - name: dashboard
  - name: Storage
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /me:
    get:
      operationId: getMe
      tags: [me]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

  /dashboard/recent-activity:
    get:
      operationId: getDashboardRecentActivity
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActivityItem" }

  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Company" } }
    post:
      operationId: createCompany
      tags: [companies]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CompanyInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Company" }
  /companies/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getCompany
      tags: [companies]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Company" }
        "404":
          description: Not Found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    patch:
      operationId: updateCompany
      tags: [companies]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CompanyInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Company" }
    delete:
      operationId: deleteCompany
      tags: [companies]
      responses:
        "204": { description: Deleted }

  /stores:
    get:
      operationId: listStores
      tags: [stores]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Store" } }
    post:
      operationId: createStore
      tags: [stores]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StoreInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Store" }
  /stores/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getStore
      tags: [stores]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Store" }
        "404":
          description: Not Found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    patch:
      operationId: updateStore
      tags: [stores]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StoreInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Store" }
    delete:
      operationId: deleteStore
      tags: [stores]
      responses:
        "204": { description: Deleted }

  /warehouses:
    get:
      operationId: listWarehouses
      tags: [warehouses]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Warehouse" } }
    post:
      operationId: createWarehouse
      tags: [warehouses]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WarehouseInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Warehouse" }
  /warehouses/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getWarehouse
      tags: [warehouses]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Warehouse" }
        "404":
          description: Not Found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    patch:
      operationId: updateWarehouse
      tags: [warehouses]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WarehouseInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Warehouse" }
    delete:
      operationId: deleteWarehouse
      tags: [warehouses]
      responses:
        "204": { description: Deleted }

  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Supplier" } }
    post:
      operationId: createSupplier
      tags: [suppliers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SupplierInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Supplier" }
  /suppliers/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getSupplier
      tags: [suppliers]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Supplier" }
        "404":
          description: Not Found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    patch:
      operationId: updateSupplier
      tags: [suppliers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SupplierInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Supplier" }
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      responses:
        "204": { description: Deleted }

  /skus:
    get:
      operationId: listSkus
      tags: [skus]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Sku" } }
    post:
      operationId: createSku
      tags: [skus]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SkuInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sku" }
  /skus/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getSku
      tags: [skus]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sku" }
        "404":
          description: Not Found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    patch:
      operationId: updateSku
      tags: [skus]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SkuInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Sku" }
    delete:
      operationId: deleteSku
      tags: [skus]
      responses:
        "204": { description: Deleted }

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UploadUrlRequest" }
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadUrlResponse" }
        "400":
          description: Invalid request.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Object content streamed.
          content:
            "*/*":
              schema: { type: string, format: binary }
        "404":
          description: File not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Object content streamed.
          content:
            "*/*":
              schema: { type: string, format: binary }
        "404":
          description: Object not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]
    ErrorResponse:
      type: object
      properties:
        error: { type: string }
      required: [error]
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name: { type: string, minLength: 1 }
        size: { type: integer, minimum: 1 }
        contentType: { type: string, minLength: 1 }
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL: { type: string, format: uri }
        objectPath: { type: string }
        metadata: { $ref: "#/components/schemas/UploadUrlRequest" }
    Me:
      type: object
      properties:
        id: { type: string }
        email: { type: ["string", "null"] }
        fullName: { type: ["string", "null"] }
        roles: { type: array, items: { type: string } }
        storeId: { type: ["string", "null"], format: uuid }
        warehouseId: { type: ["string", "null"], format: uuid }
      required: [id, roles]
    DashboardSummary:
      type: object
      properties:
        companies: { type: integer }
        stores: { type: integer }
        warehouses: { type: integer }
        suppliers: { type: integer }
        skus: { type: integer }
        unitsInStock: { type: integer }
      required: [companies, stores, warehouses, suppliers, skus, unitsInStock]
    ActivityItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        movementType: { type: string }
        skuCode: { type: ["string", "null"] }
        quantity: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, movementType, quantity, createdAt]
    Company:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, createdAt, updatedAt]
    CompanyInput:
      type: object
      properties:
        name: { type: string }
      required: [name]
    Store:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        companyId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, companyId, createdAt, updatedAt]
    StoreInput:
      type: object
      properties:
        name: { type: string }
        companyId: { type: string, format: uuid }
      required: [name, companyId]
    Warehouse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        storeId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, storeId, createdAt, updatedAt]
    WarehouseInput:
      type: object
      properties:
        name: { type: string }
        storeId: { type: string, format: uuid }
      required: [name, storeId]
    Supplier:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, createdAt, updatedAt]
    SupplierInput:
      type: object
      properties:
        name: { type: string }
      required: [name]
    Sku:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        brand: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        isSerialized: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, code, isSerialized, createdAt, updatedAt]
    SkuInput:
      type: object
      properties:
        code: { type: string }
        brand: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        isSerialized: { type: boolean }
      required: [code]
